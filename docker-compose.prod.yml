services:
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-apexdrive}_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-apexdrive_db}
    ports:
      - "${DB_PORT_EXTERNAL:-7754}:5432"
    volumes:
      - apexdrive_pg_data_prod:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME:-apexdrive}_redis_prod
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_EXTERNAL:-7753}:6379"
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ${PROJECT_NAME:-apexdrive}_backend_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-apexdrive_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      PORT: 9999
    ports:
      - "${BACKEND_PORT_EXTERNAL:-7752}:9999"
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
    container_name: ${PROJECT_NAME:-apexdrive}_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-7751}:3000"
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-apexdrive}_nginx_prod
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${HTTP_PORT_EXTERNAL:-80}:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  apexdrive_pg_data_prod:
