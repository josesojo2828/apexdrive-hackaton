services:
  # --- Base de Datos ---
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-apexdrive}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-apexdrive_db}
    ports:
      - "${DB_PORT_EXTERNAL:-10233}:5432"
    volumes:
      - apexdrive_pg_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Redis (Cache) ---
  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME:-apexdrive}_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_EXTERNAL:-10281}:6379"
    networks:
      - app_network

  # --- Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: ${PROJECT_NAME:-apexdrive}_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-apexdrive_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      PORT: 9999
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:10210/apexdrive-assets}
      INITIAL_USER_PASSWORD: ${INITIAL_USER_PASSWORD:-ChangeMe123!}
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${BACKEND_PORT_EXTERNAL:-10299}:9999"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app_network
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app
          ignore:
            - node_modules/
        - path: ./backend/package.json
          action: rebuild

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: ${PROJECT_NAME:-apexdrive}_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:10280/api}
      NODE_ENV: ${NODE_ENV:-development}
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-10240}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - app_network
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app
          ignore:
            - node_modules/
            - .next/
        - path: ./frontend/package.json
          action: rebuild

  # --- Proxy (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-apexdrive}_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${HTTP_PORT_EXTERNAL:-10280}:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

  # --- Herramientas de Desarrollo (Opcionales con profiles) ---
  pgadmin:
    image: dpage/pgadmin4
    profiles: ["dev"]
    container_name: ${PROJECT_NAME:-apexdrive}_pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT_EXTERNAL:-10255}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-root}
    volumes:
      - apexdrive_pgadmin_data:/var/lib/pgadmin
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio
    profiles: ["dev"]
    container_name: ${PROJECT_NAME:-apexdrive}_minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT_EXTERNAL:-10210}:9000"
      - "${MINIO_CONSOLE_PORT_EXTERNAL:-10211}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - apexdrive_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  apexdrive_pg_data:
  apexdrive_pgadmin_data:
  apexdrive_minio_data:
