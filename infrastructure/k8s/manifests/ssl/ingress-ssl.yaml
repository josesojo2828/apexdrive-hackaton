apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apexdrive-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
  - hosts:
    - apexdrive.quanticarch.com
    secretName: apexdrive-tls-cert
  rules:
  - host: apexdrive.quanticarch.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 9999
      - path: /apexdrive-assets
        pathType: Prefix
        backend:
          service:
            name: minio
            port:
              number: 9000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
