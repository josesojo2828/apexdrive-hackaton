apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apexdrive-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: apexdrive.quanticarch.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 9999
      - path: /apexdrive-assets
        pathType: Prefix
        backend:
          service:
            name: minio
            port:
              number: 9000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
